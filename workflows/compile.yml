name: Compile FAP
on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: "Git repository URL (GitHub or Gitea)"
        required: true
        type: string
      firmware:
        description: "Target firmware"
        required: true
        type: choice
        options: [official, momentum, unleashed, xtreme]
        default: official
      channel:
        description: "Build channel"
        required: true
        type: choice
        options: [release, dev]
        default: release
jobs:
  compile:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Clone target app
        run: git clone --depth 1 --recurse-submodules "${{ inputs.repo_url }}" /tmp/app

      - name: Find application.fam
        run: |
          FAM=$(find /tmp/app -name "application.fam" | head -1)
          if [ -z "$FAM" ]; then echo "No application.fam found"; exit 1; fi
          APP_DIR=$(dirname "$FAM")
          echo "APP_DIR=$APP_DIR" >> $GITHUB_ENV

      - name: Clone Official firmware
        if: inputs.firmware == 'official'
        run: |
          BRANCH=${{ inputs.channel == 'dev' && 'dev' || 'release' }}
          git clone --depth 1 -b $BRANCH https://github.com/flipperdevices/flipperzero-firmware.git /tmp/firmware || git clone --depth 1 https://github.com/flipperdevices/flipperzero-firmware.git /tmp/firmware
          echo "FW_DIR=/tmp/firmware" >> $GITHUB_ENV

      - name: Clone Momentum firmware
        if: inputs.firmware == 'momentum'
        run: |
          git clone --depth 1 https://github.com/Next-Flip/Momentum-Firmware.git /tmp/firmware
          echo "FW_DIR=/tmp/firmware" >> $GITHUB_ENV

      - name: Clone Unleashed firmware
        if: inputs.firmware == 'unleashed'
        run: |
          git clone --depth 1 https://github.com/DarkFlippers/unleashed-firmware.git /tmp/firmware
          echo "FW_DIR=/tmp/firmware" >> $GITHUB_ENV

      - name: Clone Xtreme firmware
        if: inputs.firmware == 'xtreme'
        run: |
          git clone --depth 1 https://github.com/Flipper-XFW/Xtreme-Firmware.git /tmp/firmware
          echo "FW_DIR=/tmp/firmware" >> $GITHUB_ENV

      - name: Copy app and compile
        run: |
          cp -r "$APP_DIR"/. $FW_DIR/applications_user/fap_app/
          cd $FW_DIR
          pip install pyserial heatshrink2 Pillow 2>/dev/null || true
          ./fbt fap APPSRC=applications_user/fap_app 2>&1 || ./fbt APPSRC=applications_user/fap_app 2>&1

      - name: Collect .fap
        run: |
          mkdir -p /tmp/output
          FAP=$(find $FW_DIR -name "*.fap" | head -1)
          if [ -z "$FAP" ]; then echo "No .fap produced"; exit 1; fi
          REPO_NAME=$(basename "${{ inputs.repo_url }}" .git)
          cp "$FAP" "/tmp/output/${REPO_NAME}.fap"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fap-output
          path: /tmp/output/*.fap
          retention-days: 30
