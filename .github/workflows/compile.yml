name: Compile FAP

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: "Git repository URL (GitHub or Gitea)"
        required: true
        type: string
      firmware:
        description: "Target firmware"
        required: true
        type: choice
        options: [official, momentum, unleashed, xtreme]
        default: official
      channel:
        description: "Build channel"
        required: true
        type: choice
        options: [release, dev]
        default: release

jobs:
  compile:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Clone target app
        run: |
          git clone --depth 1 --recurse-submodules "${{ inputs.repo_url }}" /tmp/app
          echo "✅ Cloned ${{ inputs.repo_url }}"

      - name: Find application.fam
        run: |
          FAM=$(find /tmp/app -name "application.fam" | head -1)
          if [ -z "$FAM" ]; then
            echo "❌ No application.fam found — not a Flipper Zero app"
            exit 1
          fi
          APP_DIR=$(dirname "$FAM")
          echo "APP_DIR=$APP_DIR" >> $GITHUB_ENV
          echo "✅ Found application.fam at $APP_DIR"

      - name: Set ufbt SDK source
        run: |
          CHANNEL="${{ inputs.channel }}"
          FW="${{ inputs.firmware }}"

          if [ "$FW" = "official" ]; then
            if [ "$CHANNEL" = "dev" ]; then
              echo "UFBT_ARGS=--channel=dev" >> $GITHUB_ENV
            else
              echo "UFBT_ARGS=--channel=release" >> $GITHUB_ENV
            fi

          elif [ "$FW" = "momentum" ]; then
            if [ "$CHANNEL" = "dev" ]; then
              echo "UFBT_ARGS=--index-url=https://up.momentum-fw.dev/firmware/directory.json --channel=dev" >> $GITHUB_ENV
            else
              echo "UFBT_ARGS=--index-url=https://up.momentum-fw.dev/firmware/directory.json --channel=release" >> $GITHUB_ENV
            fi

          elif [ "$FW" = "unleashed" ]; then
            if [ "$CHANNEL" = "dev" ]; then
              echo "UFBT_ARGS=--index-url=https://up.unleashedflip.com/directory.json --channel=dev" >> $GITHUB_ENV
            else
              echo "UFBT_ARGS=--index-url=https://up.unleashedflip.com/directory.json --channel=release" >> $GITHUB_ENV
            fi

          elif [ "$FW" = "xtreme" ]; then
            # Xtreme uses official SDK — ufbt doesn't have a dedicated index for it
            echo "UFBT_ARGS=--channel=release" >> $GITHUB_ENV
          fi

      - name: Build with ufbt
        uses: flipperdevices/flipperzero-ufbt-action@v0.1.3
        id: build-app
        with:
          app-dir: ${{ env.APP_DIR }}
          ufbt-args: ${{ env.UFBT_ARGS }}

      - name: Collect .fap file
        run: |
          mkdir -p /tmp/output
          # ufbt puts the output in dist/ inside the app directory
          FAP=$(find "${{ env.APP_DIR }}/dist" -name "*.fap" 2>/dev/null | head -1)
          # fallback — search anywhere newer than the clone
          if [ -z "$FAP" ]; then
            FAP=$(find /tmp/app -name "*.fap" 2>/dev/null | head -1)
          fi
          if [ -z "$FAP" ]; then
            echo "❌ No .fap file found"
            exit 1
          fi
          echo "✅ Found: $FAP"
          REPO_NAME=$(basename "${{ inputs.repo_url }}" .git)
          cp "$FAP" "/tmp/output/${REPO_NAME}.fap"
          echo "FAP_NAME=${REPO_NAME}.fap" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: "${{ env.FAP_NAME }}"
          path: /tmp/output/*.fap
          retention-days: 30

      - name: Summary
        run: |
          echo "## ✅ Compiled successfully!" >> $GITHUB_STEP_SUMMARY
          echo "| Repo | ${{ inputs.repo_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Firmware | ${{ inputs.firmware }} (${{ inputs.channel }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Output | ${{ env.FAP_NAME }} |" >> $GITHUB_STEP_SUMMARY
