name: Compile FAP
on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: "Repo URL"
        required: true
        type: string
      firmware:
        description: "Firmware"
        required: true
        type: choice
        options: [official, momentum, unleashed, xtreme]
        default: official
      channel:
        description: "Channel"
        required: true
        type: choice
        options: [release, dev]
        default: release
jobs:
  compile:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Clone app
        run: git clone --depth 1 --recurse-submodules "${{ inputs.repo_url }}" /tmp/app

      - name: Find application.fam
        run: |
          FAM=$(find /tmp/app -name "application.fam" | head -1)
          if [ -z "$FAM" ]; then echo "No application.fam found"; exit 1; fi
          echo "APP_DIR=$(dirname $FAM)" >> $GITHUB_ENV

      - name: Install ufbt
        run: pip install ufbt

      - name: Set up ufbt SDK (Official)
        if: inputs.firmware == 'official'
        run: ufbt update --channel=${{ inputs.channel }}

      - name: Set up ufbt SDK (Momentum)
        if: inputs.firmware == 'momentum'
        run: |
          ufbt update --channel=${{ inputs.channel }} \
            --index-url=https://up.momentum-fw.dev/firmware/directory.json || \
          ufbt update --channel=release \
            --index-url=https://up.momentum-fw.dev/firmware/directory.json

      - name: Set up ufbt SDK (Unleashed)
        if: inputs.firmware == 'unleashed'
        run: |
          ufbt update --channel=${{ inputs.channel }} \
            --index-url=https://up.unleashedflip.com/directory.json || \
          ufbt update --channel=release \
            --index-url=https://up.unleashedflip.com/directory.json

      - name: Set up ufbt SDK (Xtreme)
        if: inputs.firmware == 'xtreme'
        run: |
          ufbt update --channel=release \
            --index-url=https://flipper.xfw.ws/directory.json || \
          ufbt update --index-url=https://flipper.xfw.ws/directory.json

      - name: Compile with ufbt
        run: |
          cd "$APP_DIR"
          ufbt

      - name: Collect fap
        run: |
          mkdir -p /tmp/output
          FAP=$(find "$APP_DIR/dist" -name "*.fap" 2>/dev/null | head -1)
          if [ -z "$FAP" ]; then
            FAP=$(find /tmp/app -name "*.fap" 2>/dev/null | head -1)
          fi
          if [ -z "$FAP" ]; then echo "No .fap produced"; exit 1; fi
          echo "Found: $FAP"
          REPO_NAME=$(basename "${{ inputs.repo_url }}" .git)
          cp "$FAP" "/tmp/output/${REPO_NAME}.fap"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: fap-output
          path: /tmp/output/*.fap
          retention-days: 30
