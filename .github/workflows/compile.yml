name: Compile FAP

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: "Git repository URL (GitHub or Gitea)"
        required: true
        type: string
      firmware:
        description: "Target firmware"
        required: true
        type: choice
        options: [official, momentum, unleashed]
        default: official
      channel:
        description: "Build channel"
        required: true
        type: choice
        options: [release, dev]
        default: release

jobs:
  compile:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Clone target app
        run: |
          git clone --depth 1 --recurse-submodules "${{ inputs.repo_url }}" /tmp/app
          echo "✅ Cloned ${{ inputs.repo_url }}"

      - name: Find application.fam
        run: |
          FAM=$(find /tmp/app -name "application.fam" | head -1)
          if [ -z "$FAM" ]; then
            echo "❌ No application.fam found"
            exit 1
          fi
          APP_DIR=$(dirname "$FAM")
          echo "APP_DIR=$APP_DIR" >> $GITHUB_ENV
          echo "✅ Found application.fam at $APP_DIR"

      - name: Set SDK index URL
        run: |
          FW="${{ inputs.firmware }}"
          CH="${{ inputs.channel }}"
          if [ "$FW" = "momentum" ]; then
            echo "SDK_INDEX_URL=https://up.momentum-fw.dev/firmware/directory.json" >> $GITHUB_ENV
          elif [ "$FW" = "unleashed" ]; then
            echo "SDK_INDEX_URL=https://up.unleashedflip.com/directory.json" >> $GITHUB_ENV
          else
            echo "SDK_INDEX_URL=https://update.flipperzero.one/firmware/directory.json" >> $GITHUB_ENV
          fi
          echo "SDK_CHANNEL=$CH" >> $GITHUB_ENV

      - name: Build with ufbt
        uses: flipperdevices/flipperzero-ufbt-action@v0.1.3
        with:
          app-dir: ${{ env.APP_DIR }}
          sdk-index-url: ${{ env.SDK_INDEX_URL }}
          sdk-channel: ${{ env.SDK_CHANNEL }}

      - name: Collect .fap file
        run: |
          mkdir -p /tmp/output
          FAP=$(find "${{ env.APP_DIR }}/dist" -name "*.fap" 2>/dev/null | head -1)
          if [ -z "$FAP" ]; then
            FAP=$(find /tmp/app -name "*.fap" 2>/dev/null | head -1)
          fi
          if [ -z "$FAP" ]; then
            echo "❌ No .fap file found"
            exit 1
          fi
          echo "✅ Found: $FAP"
          REPO_NAME=$(basename "${{ inputs.repo_url }}" .git)
          cp "$FAP" "/tmp/output/${REPO_NAME}.fap"
          echo "FAP_NAME=${REPO_NAME}.fap" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: "${{ env.FAP_NAME }}"
          path: /tmp/output/*.fap
          retention-days: 30

      - name: Summary
        run: |
          echo "## ✅ Compiled!" >> $GITHUB_STEP_SUMMARY
          echo "| Repo | ${{ inputs.repo_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Firmware | ${{ inputs.firmware }} (${{ inputs.channel }}) |" >> $GITHUB_STEP_SUMMARY
